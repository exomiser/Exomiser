version: 2.1
orbs:
  sonarcloud: sonarsource/sonarcloud@4.0
  codecov: codecov/codecov@5.4.3
jobs:
  build:
    working_directory: ~/exomiser
    environment:
      CIRCLE_ARTIFACTS: /tmp/circleci-artifacts
      CIRCLE_TEST_REPORTS: /tmp/circleci-test-results
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - run:
          name: make executable
          command: chmod +x mvnw
      - restore_cache:
          key: exomiser-{{ arch }}-{{ checksum "pom.xml" }}
      - run: ./mvnw clean install -Dmaven.javadoc.skip=true -B -V
      - save_cache:
          paths:
            - ~/.m2
          key: exomiser-{{ arch }}-{{ checksum "pom.xml" }}
      - run: ./mvnw sonar:sonar -Dsonar.token=$SONAR_TOKEN -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=exomiser -Dsonar.projectKey=org.monarchinitiative.exomiser:exomiser
      #Save junit xml
      - run: mkdir -p $CIRCLE_TEST_REPORTS/junit/
      - run: find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} $CIRCLE_TEST_REPORTS/ \;
      #Save jars
      - run: mkdir -p $CIRCLE_ARTIFACTS/
      - run: find . -type f -regex ".*/target/exomiser.*jar" -exec cp {} $CIRCLE_ARTIFACTS/ \;
      - run: find . -type f -regex ".*/target/exomiser.*zip" -exec cp {} $CIRCLE_ARTIFACTS/ \;
      # Save test results
      - store_test_results:
          path: /tmp/circleci-test-results
      # Save artifacts
      - store_artifacts:
          path: /tmp/circleci-artifacts
      - store_artifacts:
          path: /tmp/circleci-test-results
#      - run: bash <(curl -s https://codecov.io/bash)
      - codecov/upload
workflows:
  version: 2
  build:
    jobs:
      - build